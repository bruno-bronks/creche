<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creche ERP | Sementinha do Amor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./app.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light">

  <!-- 1. Tela de Login (visível por padrão para evitar tela branca) -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <img src="./img/logo.png" alt="Logo" class="login-logo">
        <p>Software de Gestão Escolar</p>
      </div>
      <form id="auth-form-full" class="auth-form-full">
        <div class="field">
          <label>E-mail</label>
          <input type="email" name="email" required placeholder="Digite seu e-mail">
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" name="password" required placeholder="Digite sua senha">
        </div>
        <div id="register-fields" hidden>
          <div class="field">
            <label>Nome Completo</label>
            <input type="text" name="nome" placeholder="Seu nome completo">
          </div>
          <div class="field">
            <label>Qual módulo deseja acessar?</label>
            <select name="role">
              <option value="direcao">Direção</option>
              <option value="financeiro">Financeiro</option>
              <option value="secretaria">Acadêmico</option>
            </select>
          </div>
        </div>
        <div class="field invite-field" id="invite-field" hidden>
          <label>Código de Convite</label>
          <input type="text" name="inviteCode" placeholder="ABC-123">
        </div>
        <div id="auth-feedback-full" class="feedback"></div>
        <div class="login-actions">
          <button type="submit" class="btn-primary btn-block">Entrar no Sistema</button>
          <button type="button" id="toggle-register" class="btn-link">Não tem conta? Use um convite</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 2. Interface de Usuário Logado -->
  <div id="app-wrapper" class="layout" hidden>
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <img src="./img/logo.png" alt="Logo" class="sidebar-logo">
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" title="Fechar Menu">
          <span class="icon">❮</span>
        </button>
      </div>
      <nav id="nav" class="nav-vertical"></nav>
      <div class="sidebar-footer">
        <button id="logout-button-bottom" class="btn-logout-minimal">
          <span class="icon">🚪</span>
          <span class="label">Sair do Sistema</span>
        </button>
      </div>
    </aside>

    <div class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <button id="sidebar-toggle-top" class="sidebar-toggle-top">
            <span class="icon">☰</span>
          </button>
          <div id="module-indicator" class="module-indicator">
            <span id="current-module-icon">🏠</span>
            <h2 id="current-module-title">Dashboard</h2>
          </div>
        </div>
        
        <div class="top-bar-right">
          <div id="auth-status-badge" class="badge-role">
            <span id="auth-status-text">Módulo</span>
          </div>
          <button id="logout-button-top" class="btn-logout-top" title="Sair do Sistema">
            <i data-lucide="log-out"></i>
          </button>
          <div class="user-profile-toggle">
            <div id="user-avatar" class="avatar-sm">📸</div>
          </div>
        </div>
      </header>

      <div id="welcome-section" class="welcome-bar" hidden>
        <div class="container-fluid">
          <div id="welcome-content" class="welcome-content-left">
            <div class="welcome-text">
              <span class="greeting">Olá, bem-vindo(a)</span>
              <strong id="user-fullname">Usuário</strong>
            </div>
          </div>
        </div>
      </div>

      <main class="workspace-area">
      <!-- Seção Dinâmica controlada pelo app.js -->
      <header id="module-header" class="module-page-header mt-6"></header>
      
      <div id="dashboard" class="dashboard-grid"></div>
      <div id="report-strip" class="report-strip mt-6" hidden></div>
      <div id="quick-actions" class="mt-8" hidden></div>

      <section id="workspace" class="workspace mt-6">
        <div class="panel panel-table">
          <header class="panel-header">
            <div class="panel-titles">
              <h3 id="table-title">Registros</h3>
              <p id="table-description">Lista completa do sistema.</p>
            </div>
            <div class="toolbar">
              <div class="search-box">
                <input id="search-input" type="search" placeholder="Buscar registros...">
              </div>
              <div class="toolbar-actions">
                <button id="reset-button" type="button" class="btn-secondary">Limpar</button>
                <button id="print-button" type="button" class="btn-secondary">Imprimir</button>
              </div>
            </div>
          </header>
          <div id="table-container" class="table-container"></div>
        </div>
      </section>
      </main>

      <footer class="footer-modern">
        <div class="footer-content">
          <p id="sync-status" class="sync-status">🟢 Sistema Sincronizado</p>
          <p>&copy; 2026 Sementinha do Amor | Gestão de Elite</p>
        </div>
      </footer>
    </div>
  </div>

  <!-- 3. Componentes Globais -->
  <div id="slide-over" class="slide-over" hidden>
    <div class="slide-over-backdrop"></div>
    <div class="slide-over-container">
      <header class="slide-over-header">
        <div>
          <h2 id="form-title"></h2>
          <p id="form-description"></p>
        </div>
        <button id="close-slide-over" class="btn-close">&times;</button>
      </header>
      <div class="slide-over-body">
        <div id="entity-form"></div>
        <div id="module-feedback-slide" class="feedback"></div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./js/firebase-config.js?v=12"></script>
  <script type="module" src="./js/firebase-client.js?v=12"></script>
  <script src="./js/store.js?v=12"></script>
  <script src="./js/billing.js?v=12"></script>
  <script type="module" src="./js/app.js?v=12"></script>
</body>
</html>
